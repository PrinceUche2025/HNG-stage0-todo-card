<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince_dev | HNG Stage 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page-wrapper">
        <article class="todo-card" id="todo-card" data-testid="test-todo-priority-indicator">
            
            <div id="view-mode">
                <div class="card-top">
                    <input type="checkbox" data-testid="test-todo-checkbox" id="status-checkbox">
                    <h2 data-testid="test-todo-title" id="display-title">Stage 1 Task</h2>
                    <span id="priority-label" class="priority-badge">High</span>
                </div>

                <div data-testid="test-todo-collapsible-section" id="collapsible-section" class="collapsed">
                    <p data-testid="test-todo-description" id="display-description">
                        This is the task description. If it exceeds a certain length, the expand toggle will activate, allowing the user to view more or less content per Stage 1 requirements.
                    </p>
                </div>
                <button data-testid="test-todo-expand-toggle" id="expand-btn" aria-expanded="false" aria-controls="collapsible-section">Show More</button>

                <div class="card-details">
                    <div class="status-box">
                        <label for="status-control">Status</label>
                        <select data-testid="test-todo-status-control" id="status-control">
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>

                    <div class="timer-box" aria-live="polite">
                        <span data-testid="test-todo-timer" id="timer-display">Syncing...</span>
                        <span data-testid="test-todo-overdue-indicator" id="overdue-indicator" class="hidden">OVERDUE</span>
                    </div>
                </div>

                <div class="card-actions">
                    <button id="edit-btn" data-testid="test-todo-edit-button">Edit Task</button>
                </div>
            </div>

            <form data-testid="test-todo-edit-form" id="edit-form" class="hidden">
                <h3 class="form-title">Edit Todo-Card</h3>
                
                <div class="field">
                    <label for="edit-title">Task Title</label>
                    <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" required>
                </div>

                <div class="field">
                    <label for="edit-description">Description</label>
                    <textarea id="edit-description" data-testid="test-todo-edit-description-input" rows="3"></textarea>
                </div>

                <div class="row">
                    <div class="field">
                        <label for="edit-priority">Priority</label>
                        <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="edit-due-date">Due Date</label>
                        <input type="datetime-local" id="edit-due-date" data-testid="test-todo-edit-due-date-input">
                    </div>
                </div>

                <div class="form-btns">
                    <button type="button" id="save-btn" data-testid="test-todo-save-button" class="primary-btn">Save Changes</button>
                    <button type="button" id="cancel-btn" data-testid="test-todo-cancel-button" class="secondary-btn">Cancel</button>
                </div>
            </form>

        </article>
    </main>

    <script src="index.js"></script>
</body>
</html>
