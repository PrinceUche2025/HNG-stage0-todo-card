<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNG Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            
            <div class="card-header">
                <div class="title-section">
                    <h2 data-testid="test-todo-title">Create comprehensive wireframe</h2>
                    <p data-testid="test-todo-description">Discuss with UX Designer to develop the concept into effective wireframes.</p>
                </div>
                <div class="status-badge" data-testid="test-todo-status">Pending</div>
            </div>

            <div class="card-body">
                <div class="info-row">
                    <span class="label">Priority:</span>
                    <span class="priority-high" data-testid="test-todo-priority">High</span>
                </div>

                <div class="info-row">
                    <span class="label">Due:</span>
                    <time datetime="2026-04-16" data-testid="test-todo-due-date">Due Apr 16, 2026</time>
                </div>

                <div class="info-row">
                    <span class="label">Time Left:</span>
                    <span data-testid="test-todo-time-remaining" class="time-remaining">Calculating...</span>
                </div>

                <div class="tags-container" data-testid="test-todo-tags">
                    <span class="tag" data-testid="test-todo-tag-work">Work</span>
                    <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
                </div>
            </div>

            <div class="card-footer">
                <label class="toggle-container">
                    <input type="checkbox" data-testid="test-todo-complete-toggle" id="complete-toggle">
                    <span class="toggle-text">Mark as Done</span>
                </label>

                <div class="actions">
                    <button class="btn-edit" data-testid="test-todo-edit-button" aria-label="Edit Task">Edit</button>
                    <button class="btn-delete" data-testid="test-todo-delete-button" aria-label="Delete Task">Delete</button>
                </div>
            </div>
        </article>
    </main>

    <script src="index.js"></script>
</body>
</html>
